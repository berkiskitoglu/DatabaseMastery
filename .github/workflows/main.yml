name: Publish

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ./DatabaseMastery.slnx

      - name: Build
        run: dotnet build ./DatabaseMastery.slnx --configuration Release

      - name: Run Unit Tests
        run: dotnet test ./DatabaseMastery.slnx --no-build --configuration Release --filter "FullyQualifiedName!~IntegrationTests" --verbosity normal

      - name: Run Integration Tests
        run: dotnet test ./DatabaseMastery.slnx --no-build --configuration Release --filter "FullyQualifiedName~IntegrationTests" --verbosity normal
        env:
          DatabaseSettings__ConnectionString: ${{ secrets.MONGO_CONN }}
          
      - name: Publish
        run: dotnet publish ./DatabaseMastery.TransportMongoDb/DatabaseMastery.TransportMongoDb.csproj --configuration Release --no-build --output './publish'

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: transport-logistic
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: './publish'
